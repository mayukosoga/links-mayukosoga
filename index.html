  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --color-bg:        #f9f7f3;
      --color-text:      #222222;
      --color-secondary: #6a6a6a;
      --color-accent:    #c4874a;

    body {

    /* ── Page ───────────────────────────────────────────────── */
    .page {
      max-width: 560px;

      padding: 60px 20px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* ── Profile ────────────────────────────────────────────── */
    .profile { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #fff0f3;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      flex-shrink: 0;
      transform: translateZ(0);
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      mask-image: radial-gradient(white, black);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transform: translateZ(0);
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      image-rendering: smooth;
    }

    .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      color: var(--color-accent);
    }

    .profile-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-secondary);
      letter-spacing: 0;
    }

    .profile-bio {
      font-size: 14px;
      color: var(--color-secondary);
      line-height: 1.6;
      max-width: 360px;
    }

    /* ── Links ──────────────────────────────────────────────── */
    .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    .link-btn {
      display: flex;
      align-items: stretch;
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: #ffffff;
      overflow: hidden;
      transition: box-shadow 0.2s ease, transform 0.15s ease;
      cursor: pointer;
      position: relative;
    }

    .link-btn:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .link-img {
      width: 140px;
      flex-shrink: 0;
      background: var(--color-surface);
      position: relative;
    }

    .link-img img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .link-body {

      color: var(--color-text);
    }

    .link-sub {

    .link-badge {

      font-weight: 700;

    /* ── Section label ──────────────────────────────────────── */
    .section { width: 100%; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--color-secondary);
      margin-bottom: 14px;
      text-align: center;
    }

    /* ── YouTube grid ───────────────────────────────────────── */
    .yt-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .yt-card {
      display: flex;
      gap: 8px;
      align-items: stretch;
      padding: 0;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: #ffffff;
      overflow: hidden;
      transition: border-color 0.2s ease, transform 0.15s ease;
      cursor: pointer;
    }

    .yt-card:hover {
      border-color: var(--color-accent);
      transform: translateY(-2px);
    }

    .yt-thumb {
      width: 140px;
      min-height: calc(140px * 9 / 16);
      flex-shrink: 0;
      background: #ebebeb;
      position: relative;
    }

    .yt-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .yt-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.15);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .yt-card:hover .yt-play { opacity: 1; }

    .yt-play svg { width: 28px; height: 28px; fill: #fff; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.4)); }

    .yt-info { flex: 1; min-width: 0; padding: 16px; display: flex; flex-direction: column; gap: 6px; }

    .yt-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .yt-date {
      font-size: 11px;
      color: var(--color-secondary);
    }

    .yt-skeleton {
      width: 100%;
      height: 92px;
      border-radius: var(--radius-card);
      background: linear-gradient(90deg, var(--color-surface) 25%, #ebebeb 50%, var(--color-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .yt-error {
      text-align: center;
      font-size: 13px;
      color: var(--color-secondary);
      padding: 20px 0;
    }

    /* ── Social icons ───────────────────────────────────────── */
    .socials {

    .social-icon {

    /* ── Footer ─────────────────────────────────────────────── */

    }

<script>
  // ▶ チャンネルIDだけここに設定してください（APIキーはサーバー側の .env に記載）
  const YT_CHANNEL_ID = 'UCjYUu6M4-HZDZWXBXxF0aqQ'; // 例: UCxxxxxxxxxxxxxxxx

  const grid = document.getElementById('ytGrid');

  function relativeDate(iso) {
    const diff = (Date.now() - new Date(iso)) / 1000;
    if (diff < 3600)    return `${Math.floor(diff / 60)}分前`;
    if (diff < 86400)   return `${Math.floor(diff / 3600)}時間前`;
    if (diff < 604800)  return `${Math.floor(diff / 86400)}日前`;
    if (diff < 2592000) return `${Math.floor(diff / 604800)}週間前`;
    return `${Math.floor(diff / 2592000)}ヶ月前`;
  }

  // タイトルのサニタイズ（XSS対策）
  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function loadYouTube() {
    if (YT_CHANNEL_ID === 'YOUR_CHANNEL_ID') {
      grid.innerHTML = '<p class="yt-error">index.html の YT_CHANNEL_ID を設定してください</p>';
      return;
    }

    try {
      // APIキーはサーバー側のみ — クライアントはプロキシを呼ぶ
      const res  = await fetch(`/api/youtube?channelId=${encodeURIComponent(YT_CHANNEL_ID)}&maxResults=5`);
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || res.status);
      }
      const data = await res.json();

      if (!data.items?.length) {
        grid.innerHTML = '<p class="yt-error">動画が見つかりませんでした</p>';
        return;
      }

      grid.innerHTML = data.items.map(({ id, snippet }) => `
        <a class="yt-card" href="https://www.youtube.com/watch?v=${encodeURIComponent(id.videoId)}" target="_blank" rel="noopener">
          <div class="yt-thumb">
            <img src="${escapeHtml(snippet.thumbnails.medium.url)}" alt="${escapeHtml(snippet.title)}" loading="lazy" />
            <div class="yt-play">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          <div class="yt-info">
            <div class="yt-title">${escapeHtml(snippet.title)}</div>
            <div class="yt-date">${relativeDate(snippet.publishedAt)}</div>
          </div>
        </a>
      `).join('');

    } catch (err) {
      console.error(err);
      grid.innerHTML = `<p class="yt-error">動画の読み込みに失敗しました<br><small>${escapeHtml(String(err.message))}</small></p>`;
    }
  }

  loadYouTube();
</script>
